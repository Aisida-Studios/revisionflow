[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Serve static landing.html to search engine crawlers
[[redirects]]
  from   = "/"
  to     = "/landing.html"
  status = 200
  conditions = {UserAgent = ["Googlebot","Googlebot-Mobile","Googlebot-Image","Bingbot","bingbot","Slurp","DuckDuckBot","Baiduspider","YandexBot","Sogou","Exabot","facebookexternalhit","Twitterbot","LinkedInBot","WhatsApp","Slackbot","TelegramBot","Discordbot"]}

# Proxy /api/tutor to the Netlify Function (renamed from /api/ai to avoid ad blockers)
[[redirects]]
  from   = "/api/tutor"
  to     = "/.netlify/functions/tutor"
  status = 200

# All other routes -> React app
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"


[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200
